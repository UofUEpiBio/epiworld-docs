site_name: Epiworld
site_description: A general framework for epidemiologic simulation
site_url: https://UofUEpiBio.github.io/epiworld-docs

repo_name: UofUEpiBio/epiworld-docs
repo_url: https://github.com/UofUEpiBio/epiworld-docs

docs_dir: docs_src
site_dir: site

theme:
  name: material
  logo: assets/branding/epiworld.png
  favicon: assets/branding/epiworld.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: README.md
  - Guide:
    - guide/index.md
    - Fundamentals: guide/fundamentals.md
    - Building Models from Scratch: guide/building-from-scratch.md
    - Viruses, Tools, and Global Events: guide/viruses-tools-and-events.md
    - Built-in Models:
        - guide/built-in-models/index.md
        - Common Patterns: guide/built-in-models/common-patterns.md
        - Compartmental Models: guide/built-in-models/compartmental-models.md
        - Connected Population Models: guide/built-in-models/connected-population-models.md
        - Mixing Models: guide/built-in-models/mixing-models.md
        - Measles Models: guide/built-in-models/measles-models.md
        - Specialized Models: guide/built-in-models/specialized-models.md
  - Examples:
    - examples/index.md
    - Repository Gallery: examples/repository/index.md
  - C++ API:
    - reference/index.md
    - Classes: epiworld/annotated.md
    - Files: epiworld/files.md
    - Namespaces: epiworld/namespaces.md

plugins:
  - search
  - mkdoxy:
      projects:
        epiworld:
          src-dirs: epiworld-src/include/epiworld
          full-doc: true
          doxy-cfg:
            FILE_PATTERNS: "*.hpp *.h"
            RECURSIVE: YES
            EXTRACT_ALL: YES

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/object/apply:pymdownx.arithmatex.arithmatex_fenced_format {kwds: {mode: generic, tag: div}}
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
